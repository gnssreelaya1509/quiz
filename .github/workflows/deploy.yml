name: Build & Deploy Flet App

    on:
      push:
        branches: [ main, master ]
      workflow_dispatch:

    # --- THE FIX: Force GitHub to use the new Node 24 engine ---
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: read
      pages: write
      id-token: write

    concurrency:
      group: "pages"
      cancel-in-progress: true

    jobs:
      build:
        name: Compile Web App
        runs-on: ubuntu-latest
        steps:
          - name: Checkout Code
            uses: actions/checkout@v4

          - name: Setup Python
            uses: actions/setup-python@v5
            with:
              python-version: "3.12" 

          - name: Install Dependencies
            run: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt

          - name: Compile Flet to Web
            run: flet build web --yes --base-url /quiz/

          - name: Package Web Files (Artifact)
            uses: actions/upload-pages-artifact@v3
            with:
              path: build/web

      deploy:
        name: Deploy to GitHub Pages
        needs: build
        runs-on: ubuntu-latest
        environment:
          name: github-pages
          url: ${{ steps.deployment.outputs.page_url }}
        steps:
          - name: Push to Live Server
            id: deployment
            uses: actions/deploy-pages@v4
    