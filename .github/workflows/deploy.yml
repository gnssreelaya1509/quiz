name: Deploy to GitHub Pages
on:
  push:
    branches:
      - main
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: |
          pip install flet requests
          flet build web . --yes
      - run: |
          # Replace 'YOUR-REPO-NAME' with your actual repository name
          sed -i 's|href="/"|href="/YOUR-REPO-NAME/"|g' build/web/index.html
          sed -i 's|src="flutter|src="/YOUR-REPO-NAME/flutter|g' build/web/index.html
          sed -i 's|href="flutter|href="/YOUR-REPO-NAME/flutter|g' build/web/index.html
      - uses: actions/upload-pages-artifact@v3
        with: {path: 'build/web'}
      - uses: actions/deploy-pages@v4